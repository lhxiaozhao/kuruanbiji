<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>酷软笔记 - TipTap PoC</title>
<!-- TipTap & ProseMirror -->
<script src="https://unpkg.com/@tiptap/core@2.2.4/dist/index.umd.js"></script>
<script src="https://unpkg.com/@tiptap/starter-kit@2.2.4/dist/index.umd.js"></script>
<script src="https://unpkg.com/@tiptap/extension-image@2.2.4/dist/index.umd.js"></script>
<script src="https://unpkg.com/@tiptap/extension-placeholder@2.2.4/dist/index.umd.js"></script>
<script src="https://unpkg.com/@tiptap/extension-underline@2.2.4/dist/index.umd.js"></script>
<script src="https://unpkg.com/@tiptap/extension-highlight@2.2.4/dist/index.umd.js"></script>
<script src="https://unpkg.com/@tiptap/extension-task-list@2.2.4/dist/index.umd.js"></script>
<script src="https://unpkg.com/@tiptap/extension-task-item@2.2.4/dist/index.umd.js"></script>
<script src="https://unpkg.com/@tiptap/extension-code-block-lowlight@2.2.4/dist/index.umd.js"></script>
<script src="https://unpkg.com/@tiptap/extension-link@2.2.4/dist/index.umd.js"></script>
<script src="https://unpkg.com/@tiptap/extension-table@2.2.4/dist/index.umd.js"></script>
<script src="https://unpkg.com/@tiptap/extension-table-row@2.2.4/dist/index.umd.js"></script>
<script src="https://unpkg.com/@tiptap/extension-table-cell@2.2.4/dist/index.umd.js"></script>
<script src="https://unpkg.com/@tiptap/extension-table-header@2.2.4/dist/index.umd.js"></script>
<!-- Lowlight for syntax highlighting -->
<script src="https://unpkg.com/lowlight@2.8.1/dist/index.umd.js"></script>
<!-- highlight.js for preview -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/atom-one-dark.min.css">
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/highlight.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f6f8; }

/* Layout */
.app { display: flex; height: 100vh; }
.sidebar { width: 280px; background: #fff; border-right: 1px solid #e1e4e8; display: flex; flex-direction: column; }
.sidebar-header { padding: 16px; border-bottom: 1px solid #e1e4e8; }
.sidebar-header h2 { font-size: 16px; color: #24292e; }
.sidebar-header input { width: 100%; margin-top: 8px; padding: 6px 10px; border: 1px solid #e1e4e8; border-radius: 6px; font-size: 13px; }
.note-list { flex: 1; overflow-y: auto; }
.note-item { padding: 12px 16px; border-bottom: 1px solid #f0f0f0; cursor: pointer; transition: background 0.15s; }
.note-item:hover { background: #f8f9fa; }
.note-item.active { background: #e8edff; border-left: 3px solid #4a6cf7; }
.note-item h4 { font-size: 13px; color: #24292e; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.note-item p { font-size: 11px; color: #6c757d; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* Editor */
.editor-area { flex: 1; display: flex; flex-direction: column; }
.editor-header { padding: 12px 24px; border-bottom: 1px solid #e1e4e8; background: #fff; display: flex; align-items: center; gap: 12px; }
.editor-header input { flex: 1; font-size: 18px; font-weight: 600; border: none; outline: none; }
.editor-header button { padding: 6px 14px; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; }
.btn-primary { background: #4a6cf7; color: white; }
.btn-primary:hover { background: #3b5de7; }

/* Toolbar */
.toolbar { display: flex; gap: 4px; padding: 8px 16px; background: #fff; border-bottom: 1px solid #e1e4e8; flex-wrap: wrap; }
.toolbar button { padding: 6px 10px; border: 1px solid #e1e4e8; border-radius: 4px; background: #fff; cursor: pointer; font-size: 13px; transition: all 0.15s; }
.toolbar button:hover { background: #f0f0f0; border-color: #4a6cf7; color: #4a6cf7; }
.toolbar button.active { background: #4a6cf7; color: white; border-color: #4a6cf7; }
.toolbar .separator { width: 1px; background: #e1e4e8; margin: 0 4px; }

/* Editor Content */
.editor-body { flex: 1; display: flex; overflow: hidden; }
.editor-pane { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.editor-pane.split { flex: 0 0 50%; border-right: 1px solid #e1e4e8; }
.editor-pane.preview-only { flex: 1; }
.editor-pane.edit-only { flex: 1; }

.tiptap { flex: 1; padding: 24px 32px; overflow-y: auto; font-size: 15px; line-height: 1.7; }
.tiptap:focus { outline: none; }
.tiptap p { margin: 8px 0; }
.tiptap h1 { font-size: 28px; margin: 16px 0 8px; }
.tiptap h2 { font-size: 22px; margin: 14px 0 6px; }
.tiptap h3 { font-size: 18px; margin: 12px 0 6px; }
.tiptap blockquote { border-left: 3px solid #4a6cf7; padding-left: 12px; color: #6c757d; margin: 8px 0; }
.tiptap ul, .tiptap ol { padding-left: 24px; margin: 8px 0; }
.tiptap li { margin: 4px 0; }
.tiptap img { max-width: 100%; height: auto; border-radius: 4px; margin: 8px 0; cursor: pointer; }
.tiptap img.ProseMirror-selectednode { outline: 2px solid #4a6cf7; }
.tiptap pre { background: #1e1e1e; border-radius: 8px; margin: 12px 0; overflow: hidden; }
.tiptap pre code { display: block; padding: 16px; color: #abb2bf; font-family: 'SF Mono', Monaco, Consolas, monospace; font-size: 13px; line-height: 1.5; overflow-x: auto; }
.tiptap code { background: #f0f0f0; padding: 2px 6px; border-radius: 4px; font-size: 13px; font-family: 'SF Mono', Monaco, Consolas, monospace; }
.tiptap a { color: #4a6cf7; text-decoration: none; }
.tiptap a:hover { text-decoration: underline; }
.tiptap hr { border: none; border-top: 2px solid #e1e4e8; margin: 16px 0; }
.tiptap table { border-collapse: collapse; margin: 12px 0; width: 100%; }
.tiptap th, .tiptap td { border: 1px solid #e1e4e8; padding: 8px 12px; }
.tiptap th { background: #f8f9fa; font-weight: 600; }
.tiptap .task-list { list-style: none; padding-left: 0; }
.tiptap .task-list li { display: flex; align-items: flex-start; gap: 8px; }
.tiptap .task-list input[type="checkbox"] { margin-top: 4px; }
.tiptap .is-empty::before { content: attr(data-placeholder); color: #adb5bd; pointer-events: none; }

/* Preview */
.preview-pane { flex: 1; padding: 24px 32px; overflow-y: auto; background: #fff; }
.preview-pane h1 { font-size: 28px; margin: 16px 0 8px; }
.preview-pane h2 { font-size: 22px; margin: 14px 0 6px; }
.preview-pane h3 { font-size: 18px; margin: 12px 0 6px; }
.preview-pane p { margin: 8px 0; line-height: 1.7; }
.preview-pane blockquote { border-left: 3px solid #4a6cf7; padding-left: 12px; color: #6c757d; margin: 8px 0; }
.preview-pane pre { background: #1e1e1e; border-radius: 8px; margin: 12px 0; overflow: hidden; }
.preview-pane pre .code-header { display: flex; justify-content: space-between; align-items: center; padding: 8px 16px; background: #2d2d2d; font-size: 12px; color: #999; }
.preview-pane pre .code-header .lang-label { text-transform: uppercase; font-weight: 500; }
.preview-pane pre .code-header .copy-btn { background: transparent; border: none; color: #999; cursor: pointer; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
.preview-pane pre .code-header .copy-btn:hover { background: #3d3d3d; color: #fff; }
.preview-pane pre code { display: block; padding: 16px; color: #abb2bf; font-family: 'SF Mono', Monaco, Consolas, monospace; font-size: 13px; line-height: 1.5; overflow-x: auto; }
.preview-pane code { background: #f0f0f0; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
.preview-pane img { max-width: 100%; height: auto; border-radius: 4px; margin: 8px 0; }
.preview-pane a { color: #4a6cf7; }
.preview-pane table { border-collapse: collapse; margin: 12px 0; width: 100%; }
.preview-pane th, .preview-pane td { border: 1px solid #e1e4e8; padding: 8px 12px; }
.preview-pane th { background: #f8f9fa; font-weight: 600; }
.preview-pane hr { border: none; border-top: 2px solid #e1e4e8; margin: 16px 0; }

/* Footer */
.editor-footer { padding: 8px 24px; border-top: 1px solid #e1e4e8; display: flex; justify-content: space-between; align-items: center; color: #6c757d; font-size: 12px; background: #fff; }

/* Dark mode */
[data-theme="dark"] { background: #0d1117; }
[data-theme="dark"] .sidebar { background: #161b22; border-color: #30363d; }
[data-theme="dark"] .sidebar-header { border-color: #30363d; }
[data-theme="dark"] .sidebar-header h2 { color: #e6edf3; }
[data-theme="dark"] .sidebar-header input { background: #21262d; border-color: #30363d; color: #e6edf3; }
[data-theme="dark"] .note-item { border-color: #21262d; }
[data-theme="dark"] .note-item:hover { background: #21262d; }
[data-theme="dark"] .note-item.active { background: #1c2a4a; border-color: #4a6cf7; }
[data-theme="dark"] .note-item h4 { color: #e6edf3; }
[data-theme="dark"] .editor-header { background: #161b22; border-color: #30363d; }
[data-theme="dark"] .editor-header input { color: #e6edf3; }
[data-theme="dark"] .toolbar { background: #161b22; border-color: #30363d; }
[data-theme="dark"] .toolbar button { background: #21262d; border-color: #30363d; color: #e6edf3; }
[data-theme="dark"] .toolbar button:hover { background: #30363d; }
[data-theme="dark"] .tiptap { background: #0d1117; color: #e6edf3; }
[data-theme="dark"] .tiptap code { background: #21262d; color: #e6edf3; }
[data-theme="dark"] .tiptap th { background: #21262d; }
[data-theme="dark"] .tiptap th, .tiptap td { border-color: #30363d; }
[data-theme="dark"] .preview-pane { background: #0d1117; color: #e6edf3; }
[data-theme="dark"] .preview-pane code { background: #21262d; color: #e6edf3; }
[data-theme="dark"] .preview-pane th { background: #21262d; }
[data-theme="dark"] .preview-pane th, .preview-pane td { border-color: #30363d; }
[data-theme="dark"] .editor-footer { background: #161b22; border-color: #30363d; color: #8b949e; }

/* Status */
.status-bar { position: fixed; bottom: 0; left: 0; right: 0; padding: 4px 16px; background: #4a6cf7; color: white; font-size: 12px; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
.status-bar .status-item { padding: 0 8px; }
.status-bar .status-item.success { color: #4ade80; }
.status-bar .status-item.error { color: #f87171; }
.status-bar .status-item.warning { color: #fbbf24; }

/* Toast */
.toast { position: fixed; top: 20px; right: 20px; padding: 12px 20px; border-radius: 8px; font-size: 13px; z-index: 1000; animation: slideIn 0.3s ease; }
.toast.success { background: #22c55e; color: white; }
.toast.error { background: #ef4444; color: white; }
.toast.info { background: #4a6cf7; color: white; }
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* Mobile */
@media (max-width: 768px) {
  .sidebar { position: fixed; left: -280px; top: 0; bottom: 0; z-index: 100; transition: left 0.3s; }
  .sidebar.open { left: 0; }
  .editor-header { padding: 8px 12px; }
  .tiptap { padding: 16px; }
  .preview-pane { padding: 16px; }
  .toolbar { padding: 6px 8px; }
  .toolbar button { padding: 4px 8px; font-size: 12px; }
}
</style>
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2>📝 酷软笔记</h2>
      <input type="text" id="searchInput" placeholder="搜索笔记...">
    </div>
    <div class="note-list" id="noteList"></div>
  </aside>

  <!-- Editor Area -->
  <main class="editor-area">
    <div class="editor-header">
      <button onclick="toggleSidebar()" title="菜单">☰</button>
      <input type="text" id="noteTitle" placeholder="笔记标题" value="TipTap PoC 演示">
      <button class="btn-primary" onclick="saveNote()">💾 保存</button>
      <button onclick="toggleTheme()" title="切换主题">🌙</button>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <button onclick="editor.chain().focus().toggleBold()" title="粗体 Ctrl+B"><b>B</b></button>
      <button onclick="editor.chain().focus().toggleItalic()" title="斜体 Ctrl+I"><i>I</i></button>
      <button onclick="editor.chain().focus().toggleUnderline()" title="下划线"><u>U</u></button>
      <button onclick="editor.chain().focus().toggleStrike()" title="删除线"><s>S</s></button>
      <span class="separator"></span>
      <button onclick="editor.chain().focus().toggleHeading({level:1})" title="标题1">H1</button>
      <button onclick="editor.chain().focus().toggleHeading({level:2})" title="标题2">H2</button>
      <button onclick="editor.chain().focus().toggleHeading({level:3})" title="标题3">H3</button>
      <span class="separator"></span>
      <button onclick="editor.chain().focus().toggleBulletList()" title="无序列表">•</button>
      <button onclick="editor.chain().focus().toggleOrderedList()" title="有序列表">1.</button>
      <button onclick="editor.chain().focus().toggleTaskList()" title="任务列表">☑</button>
      <button onclick="editor.chain().focus().toggleCodeBlock()" title="代码块">{ }</button>
      <button onclick="editor.chain().focus().toggleBlockquote()" title="引用">"</button>
      <button onclick="insertLink()" title="链接 Ctrl+K">🔗</button>
      <button onclick="insertImage()" title="插入图片">🖼️</button>
      <button onclick="insertTable()" title="表格">▦</button>
      <button onclick="editor.chain().focus().setHorizontalRule()" title="分割线">—</button>
      <span class="separator"></span>
      <button onclick="editor.chain().focus().undo()" title="撤销 Ctrl+Z">↩</button>
      <button onclick="editor.chain().focus().redo()" title="重做 Ctrl+Y">↪</button>
    </div>

    <!-- Editor Body -->
    <div class="editor-body" id="editorBody">
      <div class="editor-pane split">
        <div id="editor" class="tiptap"></div>
      </div>
      <div class="editor-pane" id="previewPane" style="display:none;">
        <div id="preview" class="preview-pane"></div>
      </div>
    </div>

    <!-- Footer -->
    <div class="editor-footer">
      <span id="lastSaved">未保存</span>
      <span id="wordCount">0 字</span>
    </div>
  </main>
</div>

<script>
// ========== TipTap Editor ==========
const { Editor } = window.tiptap;
const { StarterKit } = window.tiptapStarterKit;
const { Image } = window.tiptapImage;
const { Placeholder } = window.tiptapPlaceholder;
const { Underline } = window.tiptapUnderline;
const { Highlight } = window.tiptapHighlight;
const { TaskList } = window.tiptapTaskList;
const { TaskItem } = window.tiptapTaskItem;
const { CodeBlockLowlight } = window.tiptapCodeBlockLowlight;
const { Link } = window.tiptapLink;
const { Table } = window.tiptapTable;
const { TableRow } = window.tiptapTableRow;
const { TableCell } = window.tiptapTableCell;
const { TableHeader } = window.tiptapTableHeader;

const editor = new Editor({
  element: document.getElementById('editor'),
  extensions: [
    StarterKit.configure({
      heading: { levels: [1, 2, 3] },
      codeBlock: false, // Use CodeBlockLowlight instead
    }),
    Image.configure({
      inline: false,
      allowBase64: true,
    }),
    Placeholder.configure({
      placeholder: '开始写作... 支持 Markdown 语法',
    }),
    Underline,
    Highlight.configure({ multicolor: true }),
    TaskList,
    TaskItem.configure({ nested: true }),
    CodeBlockLowlight.configure({
      lowlight: window.lowlight,
      defaultLanguage: 'text',
    }),
    Link.configure({
      openOnClick: false,
      HTMLAttributes: { class: 'tip-link' },
    }),
    Table.configure({ resizable: true }),
    TableRow,
    TableHeader,
    TableCell,
  ],
  content: `
<h1>欢迎使用 TipTap 编辑器</h1>
<p>这是一个 <strong>Proof of Concept</strong>，展示 TipTap 在酷软笔记中的应用效果。</p>
<h2>✨ 核心特性</h2>
<ul>
<li><strong>原生 Markdown 支持</strong> — 无需手动解析</li>
<li><strong>代码块语法高亮</strong> — 基于 Lowlight</li>
<li><strong>图片拖拽调整大小</strong> — 原生支持</li>
<li><strong>任务列表</strong> — 原生支持</li>
<li><strong>表格</strong> — 可调整列宽</li>
<li><strong>链接</strong> — 原生支持</li>
</ul>
<h2>📝 代码示例</h2>
<pre><code class="language-javascript">function hello() {
  console.log("Hello, TipTap!");
}</code></pre>
<h2>☑️ 任务列表</h2>
<ul data-type="taskList">
<li data-type="taskItem" data-checked="true"><label><input type="checkbox" checked><span>完成 TipTap 集成</span></label></li>
<li data-type="taskItem" data-checked="false"><label><input type="checkbox"><span>迁移现有笔记</span></label></li>
<li data-type="taskItem" data-checked="false"><label><input type="checkbox"><span>添加预览模式</span></label></li>
</ul>
<h2>🔗 链接示例</h2>
<p>访问 <a href="https://tiptap.dev" target="_blank">TipTap 官网</a> 了解更多。</p>
<h2>📊 表格示例</h2>
<table>
<thead><tr><th>特性</th><th>contenteditable</th><th>TipTap</th></tr></thead>
<tbody>
<tr><td>Markdown</td><td>手动解析</td><td>原生支持</td></tr>
<tr><td>代码高亮</td><td>手动实现</td><td>原生支持</td></tr>
<tr><td>图片调整</td><td>手动实现</td><td>原生支持</td></tr>
<tr><td>扩展性</td><td>差</td><td>优秀</td></tr>
</tbody>
</table>
  `,
  onUpdate: ({ editor }) => {
    updateWordCount();
    updatePreview();
  },
});

// ========== Word Count ==========
function updateWordCount() {
  const text = editor.getText();
  const chars = text.length;
  const words = text.trim() ? text.trim().split(/\s+/).length : 0;
  document.getElementById('wordCount').textContent = words + ' 词 · ' + chars + ' 字';
}

// ========== Preview ==========
function updatePreview() {
  const html = editor.getHTML();
  const preview = document.getElementById('preview');
  preview.innerHTML = html;
  // Apply syntax highlighting
  preview.querySelectorAll('pre code').forEach((block) => {
    if (!block.classList.contains('hljs')) {
      hljs.highlightElement(block);
    }
  });
}

// ========== Toolbar Active State ==========
editor.on('update', () => {
  document.querySelectorAll('.toolbar button').forEach((btn) => {
    btn.classList.remove('active');
  });
  if (editor.isActive('bold')) document.querySelector('.toolbar button[title*="粗体"]').classList.add('active');
  if (editor.isActive('italic')) document.querySelector('.toolbar button[title*="斜体"]').classList.add('active');
  if (editor.isActive('underline')) document.querySelector('.toolbar button[title*="下划线"]').classList.add('active');
  if (editor.isActive('strike')) document.querySelector('.toolbar button[title*="删除线"]').classList.add('active');
  if (editor.isActive('heading', { level: 1 })) document.querySelector('.toolbar button[title*="标题1"]').classList.add('active');
  if (editor.isActive('heading', { level: 2 })) document.querySelector('.toolbar button[title*="标题2"]').classList.add('active');
  if (editor.isActive('heading', { level: 3 })) document.querySelector('.toolbar button[title*="标题3"]').classList.add('active');
  if (editor.isActive('bulletList')) document.querySelector('.toolbar button[title*="无序列表"]').classList.add('active');
  if (editor.isActive('orderedList')) document.querySelector('.toolbar button[title*="有序列表"]').classList.add('active');
  if (editor.isActive('taskList')) document.querySelector('.toolbar button[title*="任务列表"]').classList.add('active');
  if (editor.isActive('codeBlock')) document.querySelector('.toolbar button[title*="代码块"]').classList.add('active');
  if (editor.isActive('blockquote')) document.querySelector('.toolbar button[title*="引用"]').classList.add('active');
  if (editor.isActive('link')) document.querySelector('.toolbar button[title*="链接"]').classList.add('active');
});

// ========== Insert Functions ==========
function insertLink() {
  const url = prompt('请输入链接地址：', 'https://');
  if (url) {
    editor.chain().focus().extendMarkRange('link').setLink({ href: url }).run();
  }
}

function insertImage() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      editor.chain().focus().setImage({ src: reader.result }).run();
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

function insertTable() {
  editor.chain().focus().insertTable({ rows: 3, cols: 3, withHeaderRow: true }).run();
}

// ========== Save ==========
function saveNote() {
  const title = document.getElementById('noteTitle').value;
  const content = editor.getHTML();
  const note = { title, content, timestamp: new Date().toISOString() };
  localStorage.setItem('tipap_poc_note', JSON.stringify(note));
  document.getElementById('lastSaved').textContent = '已保存 ' + new Date().toLocaleTimeString();
  showToast('保存成功', 'success');
}

function loadNote() {
  const saved = localStorage.getItem('tipap_poc_note');
  if (saved) {
    const note = JSON.parse(saved);
    document.getElementById('noteTitle').value = note.title;
    editor.commands.setContent(note.content);
    document.getElementById('lastSaved').textContent = '已加载 ' + new Date(note.timestamp).toLocaleString();
  }
}

// ========== Toast ==========
function showToast(message, type = 'info') {
  const toast = document.createElement('div');
  toast.className = 'toast ' + type;
  toast.textContent = message;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

// ========== Theme ==========
function toggleTheme() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
}

// ========== Sidebar ==========
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

// ========== Keyboard Shortcuts ==========
document.addEventListener('keydown', (e) => {
  if (e.ctrlKey || e.metaKey) {
    switch (e.key.toLowerCase()) {
      case 's': e.preventDefault(); saveNote(); break;
      case 'b': e.preventDefault(); editor.chain().focus().toggleBold().run(); break;
      case 'i': e.preventDefault(); editor.chain().focus().toggleItalic().run(); break;
      case 'k': e.preventDefault(); insertLink(); break;
    }
  }
});

// ========== Init ==========
loadNote();
updatePreview();
updateWordCount();

console.log('✅ TipTap PoC 已加载');
