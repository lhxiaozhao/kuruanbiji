<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>酷软笔记</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4a6cf7">
</head>
<body>
    <div class="app">
        <!-- 主题切换 -->
        <button class="theme-toggle" id="themeToggle" title="切换主题">☀️</button>
        
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>📝 酷软笔记</h1>
                <button id="newNote" title="新建笔记">+</button>
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索笔记...">
            </div>
            <div class="filter-tabs">
                <button class="tab active" data-filter="all">全部</button>
                <button class="tab" data-filter="starred">⭐ 收藏</button>
                <button class="tab" data-filter="trash">🗑️ 回收站</button>
            </div>
            <div id="noteList" class="note-list"></div>
        </aside>

        <!-- 主编辑区 -->
        <main class="editor">
            <div class="editor-header">
                <input type="text" id="noteTitle" placeholder="笔记标题">
                <div class="editor-actions">
                    <button id="saveNote" title="保存">💾</button>
                    <button id="togglePreview" title="预览">👁️</button>
                    <button id="toggleStar" title="收藏">☆</button>
                    <button id="deleteNote" title="删除">🗑️</button>
                    <button id="exportNote" title="导出">📤</button>
                    <button id="importNote" title="导入">📥</button>
                    <button id="printNote" title="打印">🖨️</button>
                    <button id="shareNote" title="分享">🔗</button>
                </div>
            </div>
            
            <!-- 编辑工具栏 -->
            <div class="editor-toolbar">
                <button class="toolbar-btn" data-command="bold" title="粗体"><b>B</b></button>
                <button class="toolbar-btn" data-command="italic" title="斜体"><i>I</i></button>
                <button class="toolbar-btn" data-command="underline" title="下划线"><u>U</u></button>
                <button class="toolbar-btn" data-command="strikethrough" title="删除线"><s>S</s></button>
                <span class="toolbar-divider"></span>
                <button class="toolbar-btn" data-command="h1" title="标题1">H1</button>
                <button class="toolbar-btn" data-command="h2" title="标题2">H2</button>
                <button class="toolbar-btn" data-command="h3" title="标题3">H3</button>
                <span class="toolbar-divider"></span>
                <button class="toolbar-btn" data-command="ul" title="无序列表">•</button>
                <button class="toolbar-btn" data-command="ol" title="有序列表">1.</button>
                <button class="toolbar-btn" data-command="check" title="任务列表">☑</button>
                <span class="toolbar-divider"></span>
                <button class="toolbar-btn" data-command="code" title="代码块">{ }</button>
                <button class="toolbar-btn" data-command="quote" title="引用">"</button>
                <button class="toolbar-btn" data-command="link" title="链接">🔗</button>
                <button class="toolbar-btn" data-command="image" title="图片">🖼️</button>
                <button class="toolbar-btn" data-command="table" title="表格">▦</button>
                <button class="toolbar-btn" data-command="hr" title="分割线">—</button>
            </div>
            
            <div class="editor-body">
                <textarea id="noteContent" placeholder="开始写作..."></textarea>
                <div id="preview" class="preview hidden"></div>
            </div>
            <div class="editor-footer">
                <span id="lastSaved">未保存</span>
                <span id="wordCount">0 字</span>
                <span id="noteTags" class="note-tags"></span>
            </div>
        </main>
    </div>

    <script src="js/markdown.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js');
        }
    </script>
</body>
</html>
