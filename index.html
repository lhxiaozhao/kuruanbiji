<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>酷软笔记</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4a6cf7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="酷软笔记">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #fff; color: #333; height: 100vh; overflow: hidden; }
        .app { display: flex; height: 100vh; position: relative; }

        /* 侧边栏 */
        .sidebar { width: 280px; background: #f8f9fa; border-right: 1px solid #dee2e6; display: flex; flex-direction: column; transition: width 0.3s, transform 0.3s; flex-shrink: 0; }
        .sidebar.collapsed { width: 0; overflow: hidden; padding: 0; margin: 0; border: none; }
        .sidebar.collapsed .sidebar-header, .sidebar.collapsed .search-box, .sidebar.collapsed .sidebar-toolbar, .sidebar.collapsed #selectionBar, .sidebar.collapsed .note-list { display: none; }
        .sidebar-toggle { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); width: 28px; height: 28px; border: 1px solid #dee2e6; border-radius: 6px; background: #f8f9fa; cursor: pointer; font-size: 14px; z-index: 10; transition: all 0.3s; }
        .sidebar-toggle:hover { background: #4a6cf7; color: white; border-color: #4a6cf7; }
        [data-theme="dark"] .sidebar-toggle { background: #16213e; color: #adb5bd; border-color: #2d3748; }
        [data-theme="dark"] .sidebar-toggle:hover { background: #4a6cf7; color: white; }
        .sidebar-header { padding: 16px; border-bottom: 1px solid #dee2e6; display: flex; justify-content: space-between; align-items: center; }
        .sidebar-header h1 { font-size: 16px; font-weight: 600; }
        #newNote { width: 32px; height: 32px; border: none; border-radius: 6px; background: #4a6cf7; color: white; font-size: 18px; cursor: pointer; flex-shrink: 0; }
        #newNote:hover { background: #3a56d4; }
        #templateBtn { width: 32px; height: 32px; border: none; border-radius: 6px; background: #f8f9fa; color: #6c757d; font-size: 14px; cursor: pointer; flex-shrink: 0; }
        #templateBtn:hover { background: #4a6cf7; color: white; }
[data-theme="dark"] #templateBtn { background: #16213e; color: #adb5bd; }
        [data-theme="dark"] #templateBtn:hover { background: #4a6cf7; color: white; }

        .search-box { padding: 12px 16px; border-bottom: 1px solid #dee2e6; }
        #searchInput { width: 100%; padding: 8px 12px; border: 1px solid #dee2e6; border-radius: 6px; font-size: 14px; outline: none; }
        #searchInput:focus { border-color: #4a6cf7; }

        .sidebar-toolbar { display: flex; justify-content: space-between; align-items: center; padding: 8px 16px; border-bottom: 1px solid #dee2e6; }
        .filter-tabs { display: flex; gap: 6px; }
        .tab { padding: 4px 10px; border: none; border-radius: 4px; background: transparent; color: #6c757d; cursor: pointer; font-size: 12px; }
        .tab.active { background: #4a6cf7; color: white; }
        .tab:hover:not(.active) { background: #e9ecef; }
        .sort-select { font-size: 11px; padding: 3px 6px; border: 1px solid #dee2e6; border-radius: 4px; background: #fff; color: #6c757d; cursor: pointer; outline: none; }

        .note-list { flex: 1; overflow-y: auto; padding: 8px; }
        .note-item { padding: 12px; margin-bottom: 4px; border-radius: 6px; cursor: pointer; transition: background 0.15s; }
        .note-item:hover { background: #e9ecef; }
        .note-item.active { background: #4a6cf7; color: white; }
        .note-item.active .note-preview,
        .note-item.active .note-date { color: rgba(255,255,255,0.8); }
        .note-title { font-size: 14px; font-weight: 500; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .note-title .star-indicator { margin-right: 4px; }
        .note-preview { font-size: 12px; color: #6c757d; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
        .note-date { font-size: 11px; color: #adb5bd; }
        .note-item.active .note-date .note-date-text { color: rgba(255,255,255,0.8); }

        /* 选择模式 */
        .sidebar.selecting .note-item {
            cursor: pointer;
            padding-left: 0;
        }
        .note-checkbox {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid var(--border, #dee2e6);
            border-radius: 4px;
            margin-right: 10px;
            flex-shrink: 0;
            align-items: center;
            justify-content: center;
            background: #fff;
            transition: all 0.15s;
        }
        .sidebar.selecting .note-checkbox {
            display: inline-flex;
        }
        .note-item.selected .note-checkbox {
            background: #4a6cf7;
            border-color: #4a6cf7;
        }
        .note-item.selected .note-checkbox::after {
            content: '✓';
            color: white;
            font-size: 12px;
            font-weight: bold;
        }
        .note-item-inner {
            flex: 1;
            min-width: 0;
        }
        .note-item {
            display: flex;
            align-items: center;
        }
        .selection-bar {
            display: none;
            padding: 10px 16px;
            border-bottom: 1px solid #dee2e6;
            background: #4a6cf7;
            color: white;
            align-items: center;
            justify-content: space-between;
        }
        .sidebar.selecting .selection-bar {
            display: flex;
        }
        .selection-bar .sel-count {
            font-size: 13px;
            font-weight: 500;
        }
        .selection-bar .sel-actions {
            display: flex;
            gap: 8px;
        }
        .selection-bar button {
            padding: 5px 12px;
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 4px;
            background: transparent;
            color: white;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .selection-bar button:hover {
            background: rgba(255,255,255,0.2);
        }
        .selection-bar button.danger:hover {
            background: #ef4444;
            border-color: #ef4444;
        }
        [data-theme="dark"] .sidebar.selecting .note-checkbox {
            background: #1a1a2e;
            border-color: #2d3748;
        }
        [data-theme="dark"] .note-item.selected .note-checkbox {
            background: #4a6cf7;
            border-color: #4a6cf7;
        }

        /* 编辑器 */
        .editor { flex: 1; display: flex; flex-direction: column; min-width: 0; transition: margin-left 0.3s; }
        .editor.expanded { margin-left: 0; }
        .editor-header { padding: 12px 24px; border-bottom: 1px solid #dee2e6; display: flex; justify-content: space-between; align-items: center; }
        #noteTitle { flex: 1; padding: 8px 12px; border: 1px solid #dee2e6; border-radius: 6px; font-size: 16px; font-weight: 500; outline: none; margin-right: 12px; min-width: 0; }
        #noteTitle:focus { border-color: #4a6cf7; }
        .editor-actions { display: flex; gap: 4px; flex-shrink: 0; }
        .editor-actions button { width: 32px; height: 32px; border: 1px solid #dee2e6; border-radius: 6px; background: #f8f9fa; cursor: pointer; font-size: 14px; }
        .editor-actions button:hover { background: #4a6cf7; color: white; border-color: #4a6cf7; }

        /* 编辑器工具栏 */
        .editor-toolbar { padding: 8px 24px; border-bottom: 1px solid #dee2e6; display: flex; gap: 4px; flex-wrap: wrap; background: #f8f9fa; }
        .toolbar-btn { padding: 4px 8px; border: 1px solid #dee2e6; border-radius: 4px; background: #fff; cursor: pointer; font-size: 12px; color: #6c757d; white-space: nowrap; }
        .toolbar-btn:hover { background: #4a6cf7; color: white; border-color: #4a6cf7; }
        .toolbar-divider { width: 1px; background: #dee2e6; margin: 0 4px; flex-shrink: 0; }

        .editor-body { flex: 1; position: relative; overflow: hidden; display: flex; }
        .editor-body.split { display: grid; grid-template-columns: 1fr 1fr; }
        .editor-body.split #noteContent { border-right: 1px solid #dee2e6; }
        [data-theme="dark"] .editor-body.split #noteContent { border-color: #2d3748; }
        #noteContent { width: 100%; height: 100%; padding: 24px; border: none; background: #fff; font-size: 15px; line-height: 1.7; resize: none; outline: none; font-family: 'SF Mono', 'Monaco', monospace; }
        #preview { width: 100%; height: 100%; padding: 24px; overflow-y: auto; background: #fff; line-height: 1.7; }
        .editor-body.split #preview { background: #f8f9fa; }
        [data-theme="dark"] .editor-body.split #preview { background: #16213e; }
        #preview h1, #preview h2, #preview h3 { margin: 20px 0 10px; }
        #preview p { margin: 10px 0; }
        #preview code { background: #f0f0f0; padding: 2px 6px; border-radius: 4px; font-size: 13px; font-family: 'SF Mono', 'Monaco', monospace; }
        #preview pre { background: #f0f0f0; padding: 16px; border-radius: 6px; overflow-x: auto; }
        #preview pre code { background: transparent; padding: 0; border-radius: 0; }
        #preview blockquote { border-left: 3px solid #4a6cf7; padding-left: 16px; color: #6c757d; margin: 10px 0; }
        #preview table { width: 100%; border-collapse: collapse; margin: 10px 0; }
        #preview th, #preview td { border: 1px solid #dee2e6; padding: 8px 12px; text-align: left; }
        #preview th { background: #f8f9fa; font-weight: 600; }
        #preview ul, #preview ol { padding-left: 24px; margin: 10px 0; }
        #preview li { margin: 4px 0; }
        #preview hr { border: none; border-top: 2px solid #dee2e6; margin: 20px 0; }
        #preview a { color: #4a6cf7; text-decoration: none; }
        #preview a:hover { text-decoration: underline; }
        .hidden { display: none !important; }

        .editor-footer { padding: 8px 24px; border-top: 1px solid #dee2e6; display: flex; justify-content: space-between; align-items: center; color: #adb5bd; font-size: 12px; }
        .footer-left { display: flex; gap: 16px; align-items: center; }
        .footer-right { display: flex; gap: 16px; align-items: center; }
        #installBtn { padding: 4px 10px; border: 1px solid #dee2e6; border-radius: 4px; background: #f8f9fa; cursor: pointer; font-size: 11px; color: #6c757d; }
        #installBtn:hover { background: #4a6cf7; color: white; border-color: #4a6cf7; }

        /* 主题切换 */
        .theme-toggle { width: 32px; height: 32px; border: none; border-radius: 6px; background: transparent; cursor: pointer; font-size: 14px; color: #6c757d; flex-shrink: 0; transition: all 0.2s; }
        .theme-toggle:hover { background: #e9ecef; color: #333; }
        [data-theme="dark"] .theme-toggle { color: #adb5bd; }
        [data-theme="dark"] .theme-toggle:hover { background: #0f3460; color: #e9ecef; }

        /* 查找替换 */
        .find-bar {
            display: none;
            padding: 8px 24px;
            background: #f8f9fa;
            border-bottom: 1px solid #dee2e6;
            gap: 8px;
            align-items: center;
        }
        .find-bar.show { display: flex; }
        .find-bar input {
            padding: 6px 10px;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            font-size: 13px;
            outline: none;
            background: #fff;
        }
        .find-bar input:focus { border-color: #4a6cf7; }
        .find-bar .find-input { width: 160px; }
        .find-bar .replace-input { width: 160px; }
        .find-bar .find-count { font-size: 12px; color: #6c757d; min-width: 60px; }
        .find-bar button {
            padding: 5px 10px;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            background: #fff;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .find-bar button:hover { background: #4a6cf7; color: white; border-color: #4a6cf7; }
        .find-bar .find-close {
            background: transparent;
            border: none;
            font-size: 16px;
            color: #6c757d;
            padding: 2px 6px;
        }
        .find-bar .find-close:hover { background: transparent; color: #333; }
        [data-theme="dark"] .find-bar { background: #16213e; border-color: #2d3748; }
        [data-theme="dark"] .find-bar input { background: #1a1a2e; color: #e9ecef; border-color: #2d3748; }
        [data-theme="dark"] .find-bar button { background: #1a1a2e; color: #e9ecef; border-color: #2d3748; }
        [data-theme="dark"] .find-bar .find-close { color: #adb5bd; }
        [data-theme="dark"] .find-bar .find-close:hover { color: #e9ecef; }

        /* 导出弹窗 */
        .export-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .export-modal.show { display: flex; }
        .export-modal-content {
            background: #fff;
            border-radius: 8px;
            padding: 24px;
            min-width: 280px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }
        .export-modal h3 {
            font-size: 16px;
            margin-bottom: 16px;
            color: #333;
        }
        .export-modal button {
            display: block;
            width: 100%;
            padding: 10px 16px;
            margin-bottom: 8px;
            border: 1px solid #dee2e6;
            border-radius: 6px;
            background: #fff;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
        }
        .export-modal button:hover { background: #4a6cf7; color: white; border-color: #4a6cf7; }
        .export-modal button:last-child { margin-bottom: 0; }
        .export-modal .export-cancel {
            background: transparent;
            border: none;
            color: #6c757d;
            margin-top: 8px;
        }
        .export-modal .export-cancel:hover { background: transparent; color: #333; }
        [data-theme="dark"] .export-modal-content { background: #1a1a2e; color: #e9ecef; }
        [data-theme="dark"] .export-modal h3 { color: #e9ecef; }
        [data-theme="dark"] .export-modal button { background: #16213e; color: #e9ecef; border-color: #2d3748; }
        [data-theme="dark"] .export-modal .export-cancel { color: #adb5bd; }
        [data-theme="dark"] .export-modal .export-cancel:hover { color: #e9ecef; }

        /* 暗色主题 */
        [data-theme="dark"] { background: #1a1a2e; color: #e9ecef; }
        [data-theme="dark"] .sidebar { background: #16213e; border-color: #2d3748; }
        [data-theme="dark"] .sidebar-header { border-color: #2d3748; }
        [data-theme="dark"] .search-box { border-color: #2d3748; }
        [data-theme="dark"] #searchInput { background: #1a1a2e; color: #e9ecef; border-color: #2d3748; }
        [data-theme="dark"] .sidebar-toolbar { border-color: #2d3748; }
        [data-theme="dark"] .tab:hover:not(.active) { background: #0f3460; color: #e9ecef; }
        [data-theme="dark"] .sort-select { background: #1a1a2e; color: #adb5bd; border-color: #2d3748; }
        [data-theme="dark"] .note-item:hover { background: #0f3460; }
        [data-theme="dark"] .note-preview { color: #adb5bd; }
        [data-theme="dark"] .note-date { color: #6c757d; }
        [data-theme="dark"] .editor { background: #1a1a2e; }
        [data-theme="dark"] .editor-header { border-color: #2d3748; }
        [data-theme="dark"] .editor-toolbar { background: #16213e; border-color: #2d3748; }
        [data-theme="dark"] .toolbar-btn { background: #1a1a2e; color: #adb5bd; border-color: #2d3748; }
        [data-theme="dark"] .toolbar-btn:hover { background: #4a6cf7; color: white; border-color: #4a6cf7; }
        [data-theme="dark"] .toolbar-divider { background: #2d3748; }
        [data-theme="dark"] #noteTitle { background: #16213e; color: #e9ecef; border-color: #2d3748; }
        [data-theme="dark"] .editor-actions button { background: #16213e; color: #e9ecef; border-color: #2d3748; }
        [data-theme="dark"] #noteContent { background: #1a1a2e; color: #e9ecef; }
        [data-theme="dark"] #preview { background: #1a1a2e; color: #e9ecef; }
        [data-theme="dark"] #preview code { background: #16213e; }
        [data-theme="dark"] #preview pre { background: #16213e; }
        [data-theme="dark"] #preview pre code { background: transparent; }
        [data-theme="dark"] #preview blockquote { color: #adb5bd; }
        [data-theme="dark"] #preview th, [data-theme="dark"] #preview td { border-color: #2d3748; }
        [data-theme="dark"] #preview th { background: #16213e; }
        [data-theme="dark"] #preview a { color: #6b8cff; }
        [data-theme="dark"] .editor-footer { border-color: #2d3748; color: #6c757d; }
        [data-theme="dark"] #installBtn { background: #16213e; color: #adb5bd; border-color: #2d3748; }
        [data-theme="dark"] #installBtn:hover { background: #4a6cf7; color: white; border-color: #4a6cf7; }
        [data-theme="dark"] .theme-toggle { background: #16213e; color: #e9ecef; }

        /* 空状态 */
        .empty-state { text-align: center; padding: 40px 20px; color: #adb5bd; font-size: 14px; }
        .empty-state .empty-icon { font-size: 48px; margin-bottom: 16px; }
        .empty-state .empty-text { font-size: 14px; margin-bottom: 8px; }
        .empty-state .empty-hint { font-size: 12px; color: #6c757d; margin-bottom: 16px; }
        .empty-state button { padding: 8px 16px; border: 1px solid #4a6cf7; border-radius: 6px; background: #4a6cf7; color: white; font-size: 12px; cursor: pointer; transition: all 0.2s; }
        .empty-state button:hover { background: #3a56d4; }
        [data-theme="dark"] .empty-state { color: #6c757d; }
        [data-theme="dark"] .empty-state .empty-hint { color: #adb5bd; }

        /* 响应式 */
        @media (max-width: 768px) {
            .sidebar { width: 100%; position: absolute; z-index: 10; transform: translateX(-100%); transition: transform 0.3s; }
            .sidebar.open { transform: translateX(0); }
            .editor-body.split { display: grid; grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="app">
        <button id="toggleSidebar" class="sidebar-toggle" title="展开侧边栏">→</button>
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>📝 酷软笔记</h1>
                <div style="display:flex;gap:6px;flex-shrink:0">
                    <button id="themeToggle" class="theme-toggle" title="切换主题">☀️</button>
                    <button id="importNote" title="导入">📥</button>
                    <button id="templateBtn" title="模板">📋</button>
                    <button id="newNote">+</button>
                </div>
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索笔记...">
            </div>
            <div class="sidebar-toolbar">
                <div class="filter-tabs">
                    <button class="tab active" onclick="switchFilter('all', this)">全部</button>
                    <button class="tab" onclick="switchFilter('starred', this)">⭐</button>
                </div>
                <select class="sort-select" id="sortSelect" onchange="renderNoteList()">
                    <option value="updated">按修改时间</option>
                    <option value="created">按创建时间</option>
                    <option value="title-asc">按标题 A-Z</option>
                    <option value="title-desc">按标题 Z-A</option>
                </select>
            </div>
            <div id="selectionBar" class="selection-bar">
                <span class="sel-count" id="selCount">已选 0 篇</span>
                <div class="sel-actions">
                    <button onclick="exitSelectionMode()">取消</button>
                    <button class="danger" onclick="batchDelete()">🗑️ 删除</button>
                </div>
            </div>
            <div id="noteList" class="note-list">
                <div class="empty-state">
                    <div class="empty-icon">📝</div>
                    <div class="empty-text">还没有笔记</div>
                    <div class="empty-hint">点击 + 创建你的第一篇笔记</div>
                    <button onclick="createNewNote()">新建笔记</button>
                </div>
            </div>
        </aside>

        <main class="editor">
            <div class="editor-header">
                <input type="text" id="noteTitle" placeholder="笔记标题">
                <div class="editor-actions">
                    <button id="saveNote" title="保存 (Ctrl+S)">💾</button>
                    <button id="printNote" title="打印 (Ctrl+P)">🖨️</button>
                    <button id="toggleStar" title="收藏">☆</button>
                    <button id="exportNote" title="导出">📤</button>
                </div>
            </div>

            <div class="editor-toolbar">
                <button class="toolbar-btn" onclick="insertMarkdown('bold')" title="粗体 Ctrl+B"><b>B</b></button>
                <button class="toolbar-btn" onclick="insertMarkdown('italic')" title="斜体 Ctrl+I"><i>I</i></button>
                <button class="toolbar-btn" onclick="insertMarkdown('h1')" title="标题1">H1</button>
                <button class="toolbar-btn" onclick="insertMarkdown('h2')" title="标题2">H2</button>
                <button class="toolbar-btn" onclick="insertMarkdown('h3')" title="标题3">H3</button>
                <span class="toolbar-divider"></span>
                <button class="toolbar-btn" onclick="insertMarkdown('ul')" title="无序列表">•</button>
                <button class="toolbar-btn" onclick="insertMarkdown('ol')" title="有序列表">1.</button>
                <button class="toolbar-btn" onclick="insertMarkdown('check')" title="任务列表">☑</button>
                <span class="toolbar-divider"></span>
                <button class="toolbar-btn" onclick="insertMarkdown('code')" title="代码块">{ }</button>
                <button class="toolbar-btn" onclick="insertMarkdown('quote')" title="引用">"</button>
                <button class="toolbar-btn" onclick="insertMarkdown('link')" title="链接 Ctrl+K">🔗</button>
                <button class="toolbar-btn" onclick="insertMarkdown('table')" title="表格">▦</button>
                <button class="toolbar-btn" onclick="insertMarkdown('hr')" title="分割线">—</button>
                <button class="toolbar-btn" onclick="insertImage()" title="插入图片">🖼️</button>
                <span class="toolbar-divider"></span>
                <button class="toolbar-btn" onclick="togglePreview()" id="previewToggle" title="分屏预览">👁️</button>
                <button class="toolbar-btn" onclick="toggleFindBar()" title="查找替换 Ctrl+F">🔍</button>
            </div>

            <div class="find-bar" id="findBar">
                <input type="text" class="find-input" id="findInput" placeholder="查找...">
                <span class="find-count" id="findCount">0/0</span>
                <button onclick="findPrev()">◀</button>
                <button onclick="findNext()">▶</button>
                <input type="text" class="replace-input" id="replaceInput" placeholder="替换...">
                <button onclick="replaceOne()">替换</button>
                <button onclick="replaceAll()">全部替换</button>
                <button class="find-close" onclick="toggleFindBar()">✕</button>
            </div>

            <div class="editor-body">
                <textarea id="noteContent" placeholder="开始写作..."></textarea>
                <div id="preview" class="hidden"></div>
            </div>
            <div class="editor-footer">
                <div class="footer-left">
                    <span id="lastSaved">未保存</span>
                    <button id="installBtn" class="hidden">📲 安装应用</button>
                </div>
                <div class="footer-right">
                    <span id="wordCount">0 字</span>
                </div>
            </div>
        </main>
    </div>

    <!-- 导出弹窗 -->
    <div class="export-modal" id="exportModal">
        <div class="export-modal-content">
            <h3>导出笔记</h3>
            <button onclick="exportAs('md')">📄 Markdown (.md)</button>
            <button onclick="exportAs('html')">📋 HTML (.html)</button>
            <button onclick="exportAs('txt')">📝 纯文本 (.txt)</button>
            <button class="export-cancel" onclick="closeExportModal()">取消</button>
        </div>
    </div>

    <script>
        // ============ 存储层 ============
        const STORAGE_KEY = 'coolsoft-notes-v3';
        
        function getNotes() {
            try {
                const data = localStorage.getItem(STORAGE_KEY);
                return data ? JSON.parse(data) : [];
            } catch (e) { return []; }
        }
        function saveNotes(notes) {
            try { localStorage.setItem(STORAGE_KEY, JSON.stringify(notes)); } catch (e) {}
        }

        // ============ 应用状态 ============
        let currentNote = null;
        let autoSaveTimer = null;
        let currentFilter = 'all';
        let deferredInstallPrompt = null;
        let selectedNotes = new Set();
        let longPressTimer = null;
        let longPressTarget = null;
        let isSelecting = false;

        // ============ 初始化 ============
        function init() {
            // 加载主题
            const theme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
            document.getElementById('themeToggle').textContent = theme === 'dark' ? '🌙' : '☀️';

            // 注册 Service Worker
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('service-worker.js').then(function(reg) {
                    console.log('SW registered:', reg.scope);
                }).catch(function(err) {
                    console.log('SW registration failed:', err);
                });
            }

            // PWA 安装监听
            window.addEventListener('beforeinstallprompt', function(e) {
                e.preventDefault();
                deferredInstallPrompt = e;
                document.getElementById('installBtn').classList.remove('hidden');
            });
            window.addEventListener('appinstalled', function() {
                deferredInstallPrompt = null;
                document.getElementById('installBtn').classList.add('hidden');
            });
            document.getElementById('installBtn').addEventListener('click', function() {
                if (deferredInstallPrompt) {
                    deferredInstallPrompt.prompt();
                }
            });

            bindEvents();
            renderNoteList();
            createWelcomeNote();
            // Set initial sidebar toggle button position
            document.getElementById('toggleSidebar').style.left = '288px';
        }

        // ============ 事件绑定 ============
        function bindEvents() {
            document.getElementById('themeToggle').addEventListener('click', toggleTheme);
            document.getElementById('newNote').addEventListener('click', createNewNote);
            document.getElementById('templateBtn').addEventListener('click', showTemplatePicker);
            document.getElementById('toggleSidebar').addEventListener('click', toggleSidebar);
            document.getElementById('importNote').addEventListener('click', importNote);
            document.getElementById('searchInput').addEventListener('input', function() { renderNoteList(); });
            document.getElementById('noteTitle').addEventListener('input', autoSave);
            document.getElementById('noteContent').addEventListener('input', function() { autoSave(); updateWordCount(); });
            document.getElementById('saveNote').addEventListener('click', saveCurrentNote);
            document.getElementById('toggleStar').addEventListener('click', toggleStar);
            document.getElementById('exportNote').addEventListener('click', openExportModal);
            document.getElementById('printNote').addEventListener('click', printNote);

            // 查找替换输入监听
            document.getElementById('findInput').addEventListener('input', doFind);
            document.getElementById('findInput').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    if (e.shiftKey) findPrev(); else findNext();
                }
            });
            document.getElementById('replaceInput').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    replaceOne();
                }
            });

            // Markdown 快捷键
            document.getElementById('noteContent').addEventListener('keydown', function(e) {
                if (e.ctrlKey || e.metaKey) {
                    var cmd = null;
                    if (e.key === 'b') cmd = 'bold';
                    else if (e.key === 'i') cmd = 'italic';
                    else if (e.key === 'k') cmd = 'link';
                    if (cmd) {
                        e.preventDefault();
                        insertMarkdown(cmd);
                    }
                }
            });

            // 全局快捷键
            document.addEventListener('keydown', function(e) {
                if (e.ctrlKey || e.metaKey) {
                    if (e.key === 's') { e.preventDefault(); saveCurrentNote(); }
                    else if (e.key === 'n') { e.preventDefault(); createNewNote(); }
                    else if (e.key === 'p') { e.preventDefault(); printNote(); }
                    else if (e.key === 'f') { e.preventDefault(); toggleFindBar(); }
                }
                // ESC 关闭查找栏
                if (e.key === 'Escape') {
                    var findBar = document.getElementById('findBar');
                    if (findBar.classList.contains('show')) toggleFindBar();
                    var exportModal = document.getElementById('exportModal');
                    if (exportModal.classList.contains('show')) closeExportModal();
                }
            });

            window.addEventListener('beforeunload', function() { if (currentNote) saveCurrentNote(); });
        }

        // ============ 主题 ============
        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            document.getElementById('themeToggle').textContent = next === 'dark' ? '🌙' : '☀️';
            // 主题切换时更新预览区
            var preview = document.getElementById('preview');
        }

        // ============ 侧边栏折叠 ============
        function toggleSidebar() {
            var sidebar = document.querySelector('.sidebar');
            var btn = document.getElementById('toggleSidebar');
            sidebar.classList.toggle('collapsed');
            btn.textContent = sidebar.classList.contains('collapsed') ? '→' : '←';
            btn.title = sidebar.classList.contains('collapsed') ? '展开侧边栏' : '折叠侧边栏';
            btn.style.left = sidebar.classList.contains('collapsed') ? '8px' : '288px';
        }

        // ============ 筛选 ============
        function switchFilter(filter, el) {
            currentFilter = filter;
            document.querySelectorAll('.filter-tabs .tab').forEach(function(t) { t.classList.remove('active'); });
            el.classList.add('active');
            renderNoteList();
        }

        // ============ 笔记模板 ============
        var NOTE_TEMPLATES = [
            { id: 'blank', name: '📝 空白笔记', content: '' },
            { id: 'meeting', name: '📋 会议纪要', content: '# 会议纪要\n\n**时间：** \n**地点：** \n**参会人：** \n\n## 议题\n\n1. \n2. \n3. \n\n## 决议\n\n- \n- \n\n## 待办事项\n\n- [ ] \n- [ ] \n' },
            { id: 'project', name: '📊 项目计划', content: '# 项目计划\n\n**项目名称：** \n**负责人：** \n**开始时间：** \n**截止时间：** \n\n## 项目背景\n\n## 目标\n\n## 任务分解\n\n| 任务 | 负责人 | 截止日期 | 状态 |\n|------|--------|----------|------|\n| | | | |\n\n## 风险点\n\n## 备注\n' },
            { id: 'study', name: '📖 学习笔记', content: '# 学习笔记\n\n**主题：** \n**日期：** \n**来源：** \n\n## 核心概念\n\n## 重点内容\n\n## 疑问点\n\n## 总结\n\n## 参考资料\n\n- \n- \n' },
            { id: 'todo', name: '✅ 待办清单', content: '# 待办清单\n\n## 今日任务\n\n- [ ] \n- [ ] \n- [ ] \n\n## 本周任务\n\n- [ ] \n- [ ] \n\n## 本月任务\n\n- [ ] \n- [ ] \n' },
            { id: 'review', name: '📝 需求文档', content: '# 需求文档\n\n**项目名称：** \n**版本号：** \n**日期：** \n\n## 项目概述\n\n## 功能需求\n\n### 功能1\n\n**需求描述：** \n**优先级：** \n**验收标准：** \n\n### 功能2\n\n**需求描述：** \n**优先级：** \n**验收标准：** \n\n## 非功能需求\n\n## 技术约束\n\n## 附录\n' }
        ];

        function showTemplatePicker() {
            var modal = document.createElement('div');
            modal.className = 'export-modal show';
            modal.innerHTML = '<div class="export-modal-content"><h3>选择模板</h3>' +
                NOTE_TEMPLATES.map(function(t) {
                    return '<button onclick="createNoteFromTemplate(\'' + t.id + '\')">' + t.name + '</button>';
                }).join('') +
                '<button class="export-cancel" onclick="this.closest(\'.export-modal\').remove()">取消</button></div>';
            document.body.appendChild(modal);
        }

        function createNoteFromTemplate(templateId) {
            var template = NOTE_TEMPLATES.find(function(t) { return t.id === templateId; });
            if (!template) return;
            if (currentNote) saveCurrentNote();
            var note = {
                id: generateId(),
                title: template.name.split(' ').slice(1).join(' '),
                content: template.content,
                starred: false,
                deleted: false,
                createdAt: new Date().toISOString(),
                updatedAt: new Date().toISOString()
            };
            var notes = getNotes();
            notes.push(note);
            saveNotes(notes);
            currentNote = note;
            renderEditor();
            renderNoteList();
            document.getElementById('noteTitle').focus();
            // 关闭模板弹窗
            var modal = document.querySelector('.export-modal.show');
            if (modal) modal.remove();
        }

        // ============ 笔记操作 ============
        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2);
        }

        function createWelcomeNote() {
            const notes = getNotes();
            if (notes.length === 0) {
                const note = {
                    id: generateId(), title: '👋 欢迎使用酷软笔记',
                    content: '# 欢迎使用酷软笔记\n\n纯前端 Markdown 笔记应用，数据保存在本地。\n\n## 功能\n| 类别 | 功能 |\n|------|------|\n| 📝 编辑 | Markdown 编辑、工具栏、预览、自动保存 |\n| 📋 管理 | 搜索、收藏、回收站、排序 |\n| 🔌 集成 | 打印、导出、导入 |\n| 🎨 外观 | 暗色/亮色主题 |\n| 📱 PWA | 可安装为桌面应用，离线可用 |\n\n## Markdown 快捷键\n| 快捷键 | 功能 |\n|--------|------|\n| Ctrl+B | 粗体 |\n| Ctrl+I | 斜体 |\n| Ctrl+K | 插入链接 |\n| Ctrl+S | 保存 |\n| Ctrl+N | 新建笔记 |\n| Ctrl+P | 打印 |\n\n开始写作吧！📝',
                    starred: false, deleted: false,
                    createdAt: new Date().toISOString(), updatedAt: new Date().toISOString()
                };
                notes.push(note);
                saveNotes(notes);
                renderNoteList();
            }
        }

        function createNewNote() {
            if (currentNote) saveCurrentNote();
            const note = { id: generateId(), title: '', content: '', starred: false, deleted: false, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() };
            const notes = getNotes();
            notes.push(note);
            saveNotes(notes);
            currentNote = note;
            renderEditor();
            renderNoteList();
            document.getElementById('noteTitle').focus();
        }

        function loadNote(id) {
            if (isSelecting) {
                toggleSelect(id);
                return;
            }
            if (currentNote) saveCurrentNote();
            const notes = getNotes();
            const note = notes.find(function(n) { return n.id === id; });
            if (note) { currentNote = note; renderEditor(); renderNoteList(); }
        }

        // ============ 选择模式 ============
        function enterSelectionMode(id) {
            isSelecting = true;
            selectedNotes.add(id);
            document.querySelector('.sidebar').classList.add('selecting');
            updateSelectionBar();
            renderNoteList();
        }

        function exitSelectionMode() {
            isSelecting = false;
            selectedNotes.clear();
            document.querySelector('.sidebar').classList.remove('selecting');
            renderNoteList();
        }

        function toggleSelect(id) {
            if (selectedNotes.has(id)) {
                selectedNotes.delete(id);
            } else {
                selectedNotes.add(id);
            }
            updateSelectionBar();
            renderNoteList();
        }

        function updateSelectionBar() {
            document.getElementById('selCount').textContent = '已选 ' + selectedNotes.size + ' 篇';
        }

        function batchDelete() {
            if (selectedNotes.size === 0) return;
            if (!confirm('确定要删除选中的 ' + selectedNotes.size + ' 篇笔记吗？')) return;
            var notes = getNotes();
            notes = notes.filter(function(n) { return !selectedNotes.has(n.id); });
            saveNotes(notes);
            if (currentNote && selectedNotes.has(currentNote.id)) {
                currentNote = null;
                renderEditor();
            }
            exitSelectionMode();
            renderNoteList();
        }

        // ============ 编辑器渲染 ============
        function renderEditor() {
            if (!currentNote) {
                document.getElementById('noteTitle').value = '';
                document.getElementById('noteContent').value = '';
                document.getElementById('toggleStar').textContent = '☆';
                updateWordCount();
                document.getElementById('lastSaved').textContent = '未保存';
                return;
            }
            document.getElementById('noteTitle').value = currentNote.title;
            document.getElementById('noteContent').value = currentNote.content;
            document.getElementById('toggleStar').textContent = currentNote.starred ? '⭐' : '☆';
            updateWordCount();
            updateLastSaved();
            var preview = document.getElementById('preview');
            if (!preview.classList.contains('hidden')) {
                preview.innerHTML = parseMarkdown(currentNote.content);
            }
        }

        // ============ 保存 ============
        function autoSave() {
            if (autoSaveTimer) clearTimeout(autoSaveTimer);
            autoSaveTimer = setTimeout(function() {
                saveCurrentNote();
                // 分屏模式下实时更新预览
                if (viewMode === 'split') updatePreview();
            }, 500);
        }

        function saveCurrentNote() {
            if (!currentNote) return;
            currentNote.title = document.getElementById('noteTitle').value;
            currentNote.content = document.getElementById('noteContent').value;
            currentNote.updatedAt = new Date().toISOString();
            const notes = getNotes();
            const index = notes.findIndex(function(n) { return n.id === currentNote.id; });
            if (index !== -1) { notes[index] = currentNote; saveNotes(notes); }
            updateLastSaved();
            renderNoteList();
        }

        function updateLastSaved() {
            document.getElementById('lastSaved').textContent = '已保存 ' + new Date().toLocaleTimeString('zh-CN');
        }

        function updateWordCount() {
            var text = document.getElementById('noteContent').value;
            var chars = text.length;
            var lines = text ? text.split('\n').length : 0;
            var words = text.trim() ? text.trim().split(/\s+/).length : 0;
            document.getElementById('wordCount').textContent = words + ' 词 · ' + chars + ' 字 · ' + lines + ' 行';
        }

        // ============ 编辑器操作 ============
        function toggleStar() {
            if (!currentNote) return;
            currentNote.starred = !currentNote.starred;
            saveCurrentNote();
            document.getElementById('toggleStar').textContent = currentNote.starred ? '⭐' : '☆';
            renderNoteList();
        }

        function deleteNote() {
            if (!currentNote) return;
            if (currentNote.deleted) {
                if (!confirm('确定要永久删除这篇笔记吗？')) return;
                var notes = getNotes();
                notes = notes.filter(function(n) { return n.id !== currentNote.id; });
                saveNotes(notes);
                currentNote = null;
            } else {
                currentNote.deleted = true;
                currentNote.updatedAt = new Date().toISOString();
                saveCurrentNote();
            }
            renderEditor();
            renderNoteList();
        }

        function exportNote() {
            if (!currentNote) return;
            var content = '# ' + currentNote.title + '\n\n' + currentNote.content;
            var blob = new Blob([content], { type: 'text/markdown' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = (currentNote.title || 'untitled') + '.md';
            a.click();
            URL.revokeObjectURL(url);
        }

        function importNote() {
            var input = document.createElement('input');
            input.type = 'file';
            input.accept = '.md,.markdown,.txt';
            input.onchange = function(e) {
                var file = e.target.files[0];
                if (!file) return;
                var reader = new FileReader();
                reader.onload = function() {
                    var text = reader.result;
                    var title = file.name.replace(/\.[^/.]+$/, '');
                    // 如果文件内容第一行是 # 标题，提取为标题
                    var firstLine = text.split('\n')[0];
                    if (firstLine && firstLine.startsWith('# ')) {
                        title = firstLine.substring(2).trim();
                        text = text.substring(firstLine.length).trim();
                    }
                    var note = { id: generateId(), title: title, content: text, starred: false, deleted: false, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() };
                    var notes = getNotes();
                    notes.push(note);
                    saveNotes(notes);
                    currentNote = note;
                    renderEditor();
                    renderNoteList();
                };
                reader.readAsText(file);
            };
            input.click();
        }

        function printNote() {
            if (!currentNote) return;
            var preview = document.getElementById('preview');
            var content = document.getElementById('noteContent');
            preview.innerHTML = '<h1>' + escapeHtml(currentNote.title) + '</h1>' + parseMarkdown(currentNote.content);
            preview.classList.remove('hidden');
            content.classList.add('hidden');
            setTimeout(function() { window.print(); }, 100);
        }

        // ============ 查找替换 ============
        var findMatches = [];
        var findIndex = -1;

        function toggleFindBar() {
            var bar = document.getElementById('findBar');
            bar.classList.toggle('show');
            if (bar.classList.contains('show')) {
                document.getElementById('findInput').focus();
                // 如果有选中文本，自动填入
                var textarea = document.getElementById('noteContent');
                var start = textarea.selectionStart;
                var end = textarea.selectionEnd;
                if (start !== end) {
                    document.getElementById('findInput').value = textarea.value.substring(start, end);
                    doFind();
                }
            } else {
                // 关闭时清除高亮
                findMatches = [];
                findIndex = -1;
            }
        }

        function doFind() {
            var query = document.getElementById('findInput').value;
            var textarea = document.getElementById('noteContent');
            var text = textarea.value;
            findMatches = [];
            findIndex = -1;

            if (!query) {
                document.getElementById('findCount').textContent = '0/0';
                return;
            }

            var idx = 0;
            while ((idx = text.indexOf(query, idx)) !== -1) {
                findMatches.push(idx);
                idx += query.length;
            }

            if (findMatches.length > 0) {
                findIndex = 0;
                selectMatch(findMatches[0], query.length);
            }

            document.getElementById('findCount').textContent = findMatches.length > 0 ? (findIndex + 1) + '/' + findMatches.length : '0/' + findMatches.length;
        }

        function selectMatch(start, length) {
            var textarea = document.getElementById('noteContent');
            textarea.focus();
            textarea.selectionStart = start;
            textarea.selectionEnd = start + length;
            // 滚动到选中位置
            var lineHeight = 24; // 估算行高
            var scrollPos = Math.floor(start / 60) * lineHeight; // 估算每行60字符
            textarea.scrollTop = scrollPos - textarea.clientHeight / 2;
        }

        function findNext() {
            if (findMatches.length === 0) return;
            findIndex = (findIndex + 1) % findMatches.length;
            selectMatch(findMatches[findIndex], document.getElementById('findInput').value.length);
            document.getElementById('findCount').textContent = (findIndex + 1) + '/' + findMatches.length;
        }

        function findPrev() {
            if (findMatches.length === 0) return;
            findIndex = (findIndex - 1 + findMatches.length) % findMatches.length;
            selectMatch(findMatches[findIndex], document.getElementById('findInput').value.length);
            document.getElementById('findCount').textContent = (findIndex + 1) + '/' + findMatches.length;
        }

        function replaceOne() {
            if (findMatches.length === 0) return;
            var query = document.getElementById('findInput').value;
            var replace = document.getElementById('replaceInput').value;
            var textarea = document.getElementById('noteContent');
            var text = textarea.value;
            var start = findMatches[findIndex];
            text = text.substring(0, start) + replace + text.substring(start + query.length);
            textarea.value = text;
            doFind(); // 重新查找
            autoSave();
        }

        function replaceAll() {
            if (findMatches.length === 0) return;
            var query = document.getElementById('findInput').value;
            var replace = document.getElementById('replaceInput').value;
            var textarea = document.getElementById('noteContent');
            textarea.value = textarea.value.split(query).join(replace);
            doFind();
            autoSave();
        }

        // ============ 导出 ============
        function openExportModal() {
            if (!currentNote) return;
            document.getElementById('exportModal').classList.add('show');
        }

        function closeExportModal() {
            document.getElementById('exportModal').classList.remove('show');
        }

        function exportAs(format) {
            if (!currentNote) return;
            var title = currentNote.title || 'untitled';
            var content;
            var mime;
            var ext;

            switch(format) {
                case 'md':
                    content = '# ' + title + '\n\n' + currentNote.content;
                    mime = 'text/markdown';
                    ext = '.md';
                    break;
                case 'html':
                    content = '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>' + title + '</title></head><body>' + parseMarkdown(currentNote.content) + '</body></html>';
                    mime = 'text/html';
                    ext = '.html';
                    break;
                case 'txt':
                    content = title + '\n\n' + currentNote.content.replace(/[#*`\[\]()<>]|<\/?>[^>]+(>|$)/g, '');
                    mime = 'text/plain';
                    ext = '.txt';
                    break;
            }

            var blob = new Blob([content], { type: mime + ';charset=utf-8' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = title + ext;
            a.click();
            URL.revokeObjectURL(url);
            closeExportModal();
        }

        function insertImage() {
            var input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = function(e) {
                var file = e.target.files[0];
                if (!file) return;
                var reader = new FileReader();
                reader.onload = function() {
                    var img = new Image();
                    img.onload = function() {
                        var canvas = document.createElement('canvas');
                        var MAX = 1200;
                        var w = img.width, h = img.height;
                        if (w > MAX || h > MAX) {
                            if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
                            else { w = Math.round(w * MAX / h); h = MAX; }
                        }
                        canvas.width = w;
                        canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        var base64 = canvas.toDataURL('image/jpeg', 0.85);
                        var textarea = document.getElementById('noteContent');
                        var start = textarea.selectionStart;
                        var text = textarea.value;
                        var insert = '\n![image](data:image/jpeg;base64,' + base64.substring(base64.indexOf(',') + 1) + ')\n';
                        textarea.value = text.substring(0, start) + insert + text.substring(start);
                        textarea.focus();
                        textarea.selectionStart = textarea.selectionEnd = start + insert.length;
                        autoSave();
                    };
                    img.src = reader.result;
                };
                reader.readAsDataURL(file);
            };
            input.click();
        }

        // ============ 工具函数 ============
        function escapeHtml(str) {
            var div = document.createElement('div');
            div.appendChild(document.createTextNode(str));
            return div.innerHTML;
        }

        // ============ Markdown 编辑器工具栏 ============
        function insertMarkdown(command) {
            var textarea = document.getElementById('noteContent');
            var start = textarea.selectionStart;
            var end = textarea.selectionEnd;
            var text = textarea.value;
            var selected = text.substring(start, end);
            var insert = '';
            var cursorOffset = 0;

            switch(command) {
                case 'bold':
                    insert = '**' + (selected || '粗体') + '**';
                    cursorOffset = selected ? 0 : -2;
                    break;
                case 'italic':
                    insert = '*' + (selected || '斜体') + '*';
                    cursorOffset = selected ? 0 : -1;
                    break;
                case 'h1':
                    insert = '\n# ' + (selected || '标题1');
                    cursorOffset = -2;
                    break;
                case 'h2':
                    insert = '\n## ' + (selected || '标题2');
                    cursorOffset = -2;
                    break;
                case 'h3':
                    insert = '\n### ' + (selected || '标题3');
                    cursorOffset = -2;
                    break;
                case 'ul':
                    insert = '\n- ' + (selected || '列表项');
                    cursorOffset = -2;
                    break;
                case 'ol':
                    insert = '\n1. ' + (selected || '列表项');
                    cursorOffset = -2;
                    break;
                case 'check':
                    insert = '\n- [ ] ' + (selected || '待办事项');
                    cursorOffset = -2;
                    break;
                case 'code':
                    insert = '\n```\n' + (selected || '代码') + '\n```\n';
                    cursorOffset = selected ? 0 : -6;
                    break;
                case 'quote':
                    insert = '\n> ' + (selected || '引用');
                    cursorOffset = -2;
                    break;
                case 'link':
                    insert = '[' + (selected || '链接文本') + '](url)';
                    cursorOffset = selected ? 0 : -5;
                    break;
                case 'table':
                    insert = '\n| 列1 | 列2 | 列3 |\n|-----|-----|-----|\n| 内容 | 内容 | 内容 |\n';
                    cursorOffset = -2;
                    break;
                case 'hr':
                    insert = '\n---\n';
                    cursorOffset = -2;
                    break;
            }

            textarea.value = text.substring(0, start) + insert + text.substring(end);
            textarea.focus();
            var newPos = start + insert.length + cursorOffset;
            if (newPos < 0) newPos = 0;
            textarea.selectionStart = newPos;
            textarea.selectionEnd = newPos;
            autoSave();
        }

        // ============ Markdown 预览 ============
        var viewMode = 'edit'; // 'edit' | 'split' | 'preview'

        function togglePreview() {
            var content = document.getElementById('noteContent');
            var preview = document.getElementById('preview');
            var editorBody = document.querySelector('.editor-body');
            var btn = document.getElementById('previewToggle');

            if (viewMode === 'edit') {
                viewMode = 'split';
                editorBody.classList.add('split');
                preview.classList.remove('hidden');
                updatePreview();
                btn.textContent = '📝';
            } else if (viewMode === 'split') {
                viewMode = 'preview';
                editorBody.classList.remove('split');
                preview.classList.remove('hidden');
                content.classList.add('hidden');
                updatePreview();
                btn.textContent = '✏️';
            } else {
                viewMode = 'edit';
                editorBody.classList.remove('split');
                preview.classList.add('hidden');
                content.classList.remove('hidden');
                content.focus();
                btn.textContent = '👁️';
            }
        }

        function updatePreview() {
            var preview = document.getElementById('preview');
            if (currentNote) {
                preview.innerHTML = '<h1>' + escapeHtml(currentNote.title) + '</h1>' + parseMarkdown(currentNote.content);
            }
        }

        function parseMarkdown(md) {
            if (!md) return '';
            var html = md;

            // 代码块
            html = html.replace(/^```(\w*)\n([\s\S]*?)```$/gm, function(m, lang, code) {
                return '<pre><code>' + code.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code></pre>';
            });

            // 标题
            html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
            html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
            html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

            // 任务列表
            html = html.replace(/^- \[([ xX])\] (.+)$/gm, function(m, c, t) {
                var checked = c.toLowerCase() === 'x' ? ' checked' : '';
                return '<li style="list-style:none"><input type="checkbox"' + checked + ' disabled> ' + t + '</li>';
            });

            // 无序列表
            html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
            // 有序列表
            html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');

            // 引用
            html = html.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');

            // 表格
            html = html.replace(/^\|(.+)\|\n\|[-| :]+\|((?:\n\|.*\|)*)/gm, function(m, header, body) {
                var headers = header.split('|').map(function(h) { return h.trim(); }).filter(function(h) { return h; });
                var rows = body.trim().split('\n').map(function(row) {
                    return row.split('|').map(function(c) { return c.trim(); }).filter(function(c) { return c; });
                });
                var t = '<table><thead><tr>';
                headers.forEach(function(h) { t += '<th>' + h + '</th>'; });
                t += '</tr></thead><tbody>';
                rows.forEach(function(row) {
                    t += '<tr>';
                    row.forEach(function(cell) { t += '<td>' + cell + '</td>'; });
                    t += '</tr>';
                });
                t += '</tbody></table>';
                return t;
            });

            // 分割线
            html = html.replace(/^(-{3,}|\*{3,})$/gm, '<hr>');

            // 行内代码
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

            // 图片
            html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1" style="max-width:100%">');

            // 链接
            html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

            // 粗体 + 斜体
            html = html.replace(/\*\*\*([^*]+)\*\*\*/g, '<strong><em>$1</em></strong>');
            html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');

            // 段落分段
            var blocks = html.split('\n\n');
            var result = [];
            blocks.forEach(function(p) {
                p = p.trim();
                if (!p) return;
                if (p.startsWith('<h') || p.startsWith('<pre') || p.startsWith('<blockquote') ||
                    p.startsWith('<ul') || p.startsWith('<li') || p.startsWith('<table') ||
                    p.startsWith('<hr') || p.startsWith('<img')) {
                    result.push(p);
                } else {
                    result.push('<p>' + p.replace(/\n/g, '<br>') + '</p>');
                }
            });
            html = result.join('\n');

            // 列表包裹
            html = html.replace(/((?:<li[^>]*>.*?<\/li>\n?)+)/g, '<ul>$1</ul>');
            html = html.replace(/<\/ul>\s*<ul>/g, '');

            return html;
        }

        // ============ 渲染笔记列表 ============
        function getSortFn(key) {
            return function(a, b) {
                switch(key) {
                    case 'created': return new Date(b.createdAt) - new Date(a.createdAt);
                    case 'title-asc': return (a.title || '').localeCompare(b.title || '');
                    case 'title-desc': return (b.title || '').localeCompare(a.title || '');
                    default: return new Date(b.updatedAt) - new Date(a.updatedAt);
                }
            };
        }

        function renderNoteList() {
            var notes = getNotes();
            var keyword = document.getElementById('searchInput').value;
            var sortKey = document.getElementById('sortSelect').value;

            if (currentFilter === 'all') notes = notes.filter(function(n) { return !n.deleted; });
            else if (currentFilter === 'starred') notes = notes.filter(function(n) { return n.starred && !n.deleted; });

            if (keyword) {
                var lower = keyword.toLowerCase();
                notes = notes.filter(function(n) {
                    return n.title.toLowerCase().includes(lower) || n.content.toLowerCase().includes(lower);
                });
            }

            notes.sort(getSortFn(sortKey));

            var listEl = document.getElementById('noteList');
            if (notes.length === 0) {
                listEl.innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-text">没有找到笔记</div><div class="empty-hint">试试其他搜索关键词</div></div>';
                return;
            }

            listEl.innerHTML = notes.map(function(note) {
                var preview = note.content.replace(/[#*`\[\]()<>]|<\/?>[^>]+(>|$)/g, '').substring(0, 50);
                var date = new Date(note.updatedAt).toLocaleDateString('zh-CN');
                var active = currentNote && currentNote.id === note.id && !isSelecting ? 'active' : '';
                var selected = selectedNotes.has(note.id) ? 'selected' : '';
                var star = note.starred ? '<span class="star-indicator">⭐</span>' : '';
                var itemClass = 'note-item ' + active + ' ' + selected;
                var clickAttr = isSelecting ? 'onclick="toggleSelect(\'' + note.id + '\')"' : 'onclick="loadNote(\'' + note.id + '\')"';
                return '<div class="' + itemClass + '" ' + clickAttr +
                    ' onmousedown="startLongPress(\'' + note.id + '\', this)" ' +
                    ' ontouchstart="startLongPress(\'' + note.id + '\', this)" ' +
                    ' onmouseup="cancelLongPress()" ' +
                    ' ontouchend="cancelLongPress()" ' +
                    ' onmouseleave="cancelLongPress()" ' +
                    ' data-note-id="' + note.id + '">' +
                    '<span class="note-checkbox"></span>' +
                    '<div class="note-item-inner">' +
                    '<div class="note-title">' + star + (note.title || '无标题') + '</div>' +
                    '<div class="note-preview">' + (preview || '空笔记') + '</div>' +
                    '<div class="note-date">' + date + '</div></div></div>';
            }).join('');
        }

        // ============ 长按检测 ============
        function startLongPress(id, el) {
            if (isSelecting) return;
            longPressTarget = id;
            longPressTimer = setTimeout(function() {
                longPressTimer = null;
                enterSelectionMode(id);
                if (navigator.vibrate) navigator.vibrate(50);
            }, 500);
        }

        function cancelLongPress() {
            if (longPressTimer) {
                clearTimeout(longPressTimer);
                longPressTimer = null;
                longPressTarget = null;
            }
        }

        // ============ 启动 ============
        init();
    </script>
</body>
</html>
