        // 同步滚动（编辑区 → 预览区）
        var scrollSyncTimer = null;
        function syncScrollToPreview() {
            if (viewMode !== 'split') return;
            var editor = document.getElementById('noteContent');
            var preview = document.getElementById('preview');
            if (!editor || !preview) return;
            var ratio = editor.scrollTop / (editor.scrollHeight - editor.clientHeight);
            if (isNaN(ratio) || ratio < 0) ratio = 0;
            preview.scrollTop = ratio * (preview.scrollHeight - preview.clientHeight);
        }

        // 绑定同步滚动事件
        document.getElementById('noteContent').addEventListener('scroll', function() {
            if (scrollSyncTimer) clearTimeout(scrollSyncTimer);
            scrollSyncTimer = setTimeout(syncScrollToPreview, 50);
        });

        function parseMarkdown(md, notes) {
            if (!md) return '';
            var html = md;

            // 笔记内链接 [[笔记名]]
            html = html.replace(/\[\[([^\]]+)\]\]/g, function(m, name) {
                if (!notes) return m;
                var target = notes.find(function(n) { return n.title === name && !n.deleted; });
                if (target) {
                    var safeId = target.id.replace(/'/g, "\\'");
                    var safeName = name.replace(/'/g, "\\'");
                    return '<a href="#" onclick="loadNote(\'' + safeId + '\');return false;" style="color:#4a6cf7;font-weight:500">📎 ' + safeName + '</a>';
                }
                var safeName = name.replace(/'/g, "\\'");
                return '<span style="color:#dc3545;text-decoration:line-through">📎 ' + safeName + ' (不存在)</span>';
            });

            // Mermaid 图表
            html = html.replace(/^```mermaid\n([\s\S]*?)```$/gm, function(m, code) {
                return '<div class="mermaid">' + code + '</div>';
            });

            // 代码块（语法高亮）
            html = html.replace(/^```(\w*)\n([\s\S]*?)```$/gm, function(m, lang, code) {
                var escaped = code.replace(/</g, '&lt;').replace(/>/g, '&gt;');
                var langClass = lang ? ' class="language-' + lang + '"' : '';
                var langLabel = lang || 'Code';
                return '<pre>' +
                    '<div class="code-header">' +
                        '<span class="lang-label">' + langLabel + '</span>' +
                        '<button class="copy-btn" onclick="copyCodeBlock(this)">复制</button>' +
                    '</div>' +
                    '<code' + langClass + '>' + escaped + '</code></pre>';
            });

            // 标题
            html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
            html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
            html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

            // 任务列表
            html = html.replace(/^- \[([ xX])\] (.+)$/gm, function(m, c, t) {
                var checked = c.toLowerCase() === 'x' ? ' checked' : '';
                return '<li style="list-style:none"><input type="checkbox"' + checked + ' disabled> ' + t + '</li>';
            });

            // 无序列表
            html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
            // 有序列表
            html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');

            // 引用
            html = html.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');

            // 表格
            html = html.replace(/^\|(.+)\|\n\|[-| :]+\|((?:\n\|.*\|)*)/gm, function(m, header, body) {
                var headers = header.split('|').map(function(h) { return h.trim(); }).filter(function(h) { return h; });
                var rows = body.trim().split('\n').map(function(row) {
                    return row.split('|').map(function(c) { return c.trim(); }).filter(function(c) { return c; });
                });
                var t = '<table><thead><tr>';
                headers.forEach(function(h) { t += '<th>' + h + '</th>'; });
                t += '</tr></thead><tbody>';
                rows.forEach(function(row) {
                    t += '<tr>';
                    row.forEach(function(cell) { t += '<td>' + cell + '</td>'; });
                    t += '</tr>';
                });
                t += '</tbody></table>';
                return t;
            });

            // 分割线
            html = html.replace(/^(-{3,}|\*{3,})$/gm, '<hr>');

            // 行内代码
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

            // 图片
            html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1" style="max-width:100%">');

            // 链接
            html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

            // 粗体 + 斜体
            html = html.replace(/\*\*\*([^*]+)\*\*\*/g, '<strong><em>$1</em></strong>');
            html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');

            // 段落分段
            var blocks = html.split('\n\n');
            var result = [];
            blocks.forEach(function(p) {
                p = p.trim();
                if (!p) return;
                if (p.startsWith('<h') || p.startsWith('<pre') || p.startsWith('<blockquote') ||
                    p.startsWith('<ul') || p.startsWith('<li') || p.startsWith('<table') ||
                    p.startsWith('<hr') || p.startsWith('<img') || p.startsWith('<div class="mermaid"')) {
                    result.push(p);
                } else {
                    result.push('<p>' + p.replace(/\n/g, '<br>') + '</p>');
                }
            });
            html = result.join('\n');

            // 列表包裹
            html = html.replace(/((?:<li[^>]*>.*?<\/li>\n?)+)/g, '<ul>$1</ul>');
            html = html.replace(/<\/ul>\s*<ul>/g, '');

            return html;
        }

        // ============ 渲染增强 ============
        function applySyntaxHighlighting() {
            document.querySelectorAll('#preview pre code').forEach(function(block) {
                if (!block.classList.contains('hljs')) {
                    hljs.highlightElement(block);
                }
            });
            // 编辑器侧也要高亮
            document.querySelectorAll('#noteContent pre code').forEach(function(block) {
                if (!block.classList.contains('hljs')) {
                    hljs.highlightElement(block);
                }
            });
        }

        var mermaidCounter = 0;

        async function applyMermaid() {
            var promises = [];
            document.querySelectorAll('#preview .mermaid').forEach(function(el) {
                if (!el.dataset.processed) {
                    el.dataset.processed = 'true';
                    var id = 'mermaid-' + (++mermaidCounter);
                    promises.push(
                        mermaid.render(id, el.textContent)
                            .then(function(result) { el.innerHTML = result.svg; })
                            .catch(function(err) { el.innerHTML = '<p style="color:#dc3545">Mermaid 渲染失败: ' + err.message + '</p>'; })
                    );
                }
            });
            return Promise.all(promises);
        }

        function applyKaTeX() {
            var preview = document.getElementById('preview');
            if (preview && typeof renderMathInElement === 'function') {
                renderMathInElement(preview, {
                    delimiters: [
                        {left: '$$', right: '$$', display: true},
                        {left: '$', right: '$', display: false},
                        {left: '\\[', right: '\\]', display: true},
                        {left: '\\(', right: '\\)', display: false}
                    ],
                    throwOnError: false
                });
            }
        }

        // 初始化 Mermaid — 优先使用原生暗色主题
        if (typeof mermaid !== 'undefined') {
            mermaid.initialize({ startOnLoad: false, theme: 'default' });
        }

        // 主题切换时同步更新 Mermaid 主题
        function updateMermaidTheme(theme) {
            if (typeof mermaid !== 'undefined') {
                mermaid.initialize({ startOnLoad: false, theme: theme === 'dark' ? 'dark' : 'default' });
            }
        }

        // ============ 渲染笔记列表 ============
        function getSortFn(key) {
            return function(a, b) {
                switch(key) {
                    case 'created': return new Date(b.createdAt) - new Date(a.createdAt);
                    case 'title-asc': return (a.title || '').localeCompare(b.title || '');
                    case 'title-desc': return (b.title || '').localeCompare(a.title || '');
                    default: return new Date(b.updatedAt) - new Date(a.updatedAt);
                }
            };
        }

        function renderNoteList() {
            var notes = getNotes();
            var keyword = document.getElementById('searchInput').value;
            var sortKey = document.getElementById('sortSelect').value;
            var categoryFilter = document.getElementById('categorySelect').value;

            if (currentFilter === 'all') notes = notes.filter(function(n) { return !n.deleted; });
            else if (currentFilter === 'starred') notes = notes.filter(function(n) { return n.starred && !n.deleted; });
            else if (currentFilter === 'trash') notes = notes.filter(function(n) { return n.deleted; });

            if (categoryFilter) {
                notes = notes.filter(function(n) { return n.category === categoryFilter; });
            }

            // 文件夹筛选
            var folderFilter = getFolderFilter();
            if (folderFilter) {
                notes = notes.filter(function(n) { return n.folder === folderFilter; });
            }

            // 标签筛选
            var tagFilter = getTagFilter();
            if (tagFilter) {
                notes = notes.filter(function(n) {
                    return extractTags(n.content).indexOf(tagFilter) !== -1;
                });
            }

            if (keyword) {
                var lower = keyword.toLowerCase();
                notes = notes.filter(function(n) {
                    return n.title.toLowerCase().includes(lower) || n.content.toLowerCase().includes(lower);
                });
            }

            // 高级筛选 - 日期范围
            var advFilters = getAdvancedFilters();
            if (advFilters.dateFrom) {
                var from = new Date(advFilters.dateFrom).getTime();
                notes = notes.filter(function(n) { return new Date(n.updatedAt).getTime() >= from; });
            }
            if (advFilters.dateTo) {
                var to = new Date(advFilters.dateTo + 'T23:59:59').getTime();
                notes = notes.filter(function(n) { return new Date(n.updatedAt).getTime() <= to; });
            }
            if (advFilters.tag) {
                var tagLower = advFilters.tag.toLowerCase();
                notes = notes.filter(function(n) {
                    var tags = extractTags(n.content);
                    return tags.some(function(t) { return t.toLowerCase().includes(tagLower); });
                });
            }

            // 更新搜索结果计数
            var countEl = document.getElementById('searchCount');
            if (countEl && keyword) {
                countEl.textContent = notes.length + ' 条结果';
            } else if (countEl) {
                countEl.textContent = '';
            }

            // 搜索建议
            var searchSuggestions = [];
            if (keyword && keyword.length >= 2) {
                searchSuggestions = getSearchSuggestions(keyword, notes);
            }
            showSearchSuggestions(searchSuggestions);

            // 置顶笔记排前面
            notes.sort(function(a, b) {
                if (a.pinned && !b.pinned) return -1;
                if (!a.pinned && b.pinned) return 1;
                return getSortFn(sortKey)(a, b);
            });

            var listEl = document.getElementById('noteList');
            if (notes.length === 0) {
                if (currentFilter === 'trash') {
                    listEl.innerHTML = '<div class="empty-state"><div class="empty-icon">🗑️</div><div class="empty-text">回收站为空</div><div class="empty-hint">删除的笔记会出现在这里</div></div>';
                } else {
                    listEl.innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-text">没有找到笔记</div><div class="empty-hint">试试其他搜索关键词</div></div>';
                }
                return;
            }

            listEl.innerHTML = notes.map(function(note) {
                var preview = note.content.replace(/[#*`\[\]()<>]|<\/?>[^>]+(>|$)/g, '').substring(0, 50);
                var date = new Date(note.updatedAt).toLocaleDateString('zh-CN');
                var active = currentNote && currentNote.id === note.id && !isSelecting ? 'active' : '';
                var selected = selectedNotes.has(note.id) ? 'selected' : '';
                var star = note.starred ? '<span class="star-indicator">⭐</span>' : '';
                var pin = note.pinned ? '<span class="pin-indicator">📌</span>' : '';
                var category = note.category ? '<span class="category-tag">' + note.category + '</span>' : '';
                var tags = extractTags(note.content);
                var tagHtml = '';
                if (tags.length > 0) {
                    tagHtml = '<span class="tag-list">' + tags.map(function(t) { return '<span class="tag-item">#' + t + '</span>'; }).join('') + '</span>';
                }
                var lock = note.locked ? '<span class="lock-indicator">🔒</span>' : '';
                var itemClass = 'note-item ' + active + ' ' + selected;
                var clickAttr = isSelecting ? 'onclick="toggleSelect(\'' + note.id + '\')"' : (currentFilter === 'trash' ? 'onclick="restoreNote(\'' + note.id + '\')"' : 'onclick="loadNote(\'' + note.id + '\')"');
                // 搜索高亮
                var highlightedPreview = highlightSearch(preview, keyword);
                return '<div class="' + itemClass + '" ' + clickAttr +
                    ' onmousedown="startLongPress(\'' + note.id + '\', this)" ' +
                    ' ontouchstart="startLongPress(\'' + note.id + '\', this)" ' +
                    ' onmouseup="cancelLongPress()" ' +
                    ' ontouchend="cancelLongPress()" ' +
                    ' onmouseleave="cancelLongPress()" ' +
                    ' data-note-id="' + note.id + '">' +
                    '<span class="note-checkbox"></span>' +
                    '<div class="note-item-inner">' +
                    '<div class="note-title">' + lock + pin + star + (note.title || '无标题') + category + tagHtml + '</div>' +
                    '<div class="note-preview">' + (highlightedPreview || '空笔记') + '</div>' +
                    '<div class="note-date">' + date + '</div></div></div>';
            }).join('');
            renderTagCloud();
            renderFolderTree();
        }

        // ============ 标签云 ============
        function highlightSearch(text, keyword) {
            if (!keyword || !text) return text;
            var lower = keyword.toLowerCase();
            var lowerText = text.toLowerCase();
            var index = lowerText.indexOf(lower);
            if (index === -1) return text;
            var before = text.substring(0, index);
            var match = text.substring(index, index + keyword.length);
            var after = text.substring(index + keyword.length);
            return before + '<mark style="background:#ffc107;padding:0 2px;border-radius:2px">' + match + '</mark>' + after;
        }

        function showSearchSuggestions(suggestions) {
            var el = document.getElementById('searchSuggestions');
            if (!el) return;
            if (!suggestions || suggestions.length === 0) {
                el.classList.remove('show');
                return;
            }
            el.innerHTML = suggestions.map(function(s) {
                var typeLabel = s.type === 'title' ? '📝' : '#';
                return '<div class="search-suggestion" onclick="applySearchSuggestion('' + s.text.replace(/'/g, "\'") + '')">' +
                    '<span class="sug-type">' + typeLabel + '</span>' +
                    '<span class="sug-text">' + s.text + '</span>' +
                    '</div>';
            }).join('');
            el.classList.add('show');
        }

        function applySearchSuggestion(text) {
            var input = document.getElementById('searchInput');
            if (input) {
                input.value = text;
                renderNoteList();
            }
            var sugEl = document.getElementById('searchSuggestions');
            if (sugEl) sugEl.classList.remove('show');
        }

        // 点击外部关闭搜索建议
        document.addEventListener('click', function(e) {
            var sugEl = document.getElementById('searchSuggestions');
            var input = document.getElementById('searchInput');
            if (sugEl && input && !input.contains(e.target) && !sugEl.contains(e.target)) {
                sugEl.classList.remove('show');
            }
        });

        function toggleAdvancedFilter() {
            var el = document.getElementById('advancedFilter');
            if (el.style.display === 'none') {
                el.style.display = 'block';
            } else {
                el.style.display = 'none';
            }
        }

        function applyAdvancedFilter() {
            renderNoteList();
        }

        function clearAdvancedFilter() {
            document.getElementById('filterDateFrom').value = '';
            document.getElementById('filterDateTo').value = '';
            document.getElementById('filterTag').value = '';
            renderNoteList();
        }

        function getAdvancedFilters() {
            return {
                dateFrom: document.getElementById('filterDateFrom').value,
                dateTo: document.getElementById('filterDateTo').value,
                tag: document.getElementById('filterTag').value.trim()
            };
        }

        function getSearchSuggestions(keyword, notes) {
            var suggestions = [];
            var lower = keyword.toLowerCase();
            notes.forEach(function(n) {
                if (n.title.toLowerCase().includes(lower)) {
                    suggestions.push({ type: 'title', text: n.title });
                }
                var tags = extractTags(n.content);
                tags.forEach(function(t) {
                    if (t.toLowerCase().includes(lower) && suggestions.indexOf(t) === -1) {
                        suggestions.push({ type: 'tag', text: '#' + t });
                    }
                });
            });
            return suggestions.slice(0, 5);
        }

        function renderTagCloud() {
            var notes = getNotes();
            notes = notes.filter(function(n) { return !n.deleted; });
            var tagMap = {};
            notes.forEach(function(n) {
                extractTags(n.content).forEach(function(t) {
                    tagMap[t] = (tagMap[t] || 0) + 1;
                });
            });
            var tags = Object.keys(tagMap).sort(function(a, b) { return tagMap[b] - tagMap[a]; });
            var cloud = document.getElementById('tagCloud');
            if (!cloud) return;
            if (tags.length === 0) {
                cloud.style.display = 'none';
                return;
            }
            cloud.style.display = 'block';
            cloud.innerHTML = '<span style="color:#6c757d;margin-right:4px">标签:</span>' +
                tags.map(function(t) {
                    return '<span style="display:inline-flex;align-items:center;margin-right:8px">' +
                        '<span onclick="setTagFilter(\'' + escapeHtml(t) + '\');renderNoteList();" style="cursor:pointer;color:#4a6cf7">#' + escapeHtml(t) + ' (' + tagMap[t] + ')</span>' +
                        '<span onclick="deleteTag(\'' + escapeHtml(t) + '\')" style="cursor:pointer;color:#dc3545;margin-left:2px;font-size:10px">✕</span>' +
                        '</span>';
                }).join('');
        }

        function deleteTag(tag) {
            if (!confirm('确定要删除标签 #' + tag + ' 吗？\n\n这将移除所有笔记中该标签的引用。')) return;
            var notes = getNotes();
            var updated = 0;
            notes.forEach(function(n) {
                if (!n.deleted && n.content.indexOf('#' + tag) !== -1) {
                    n.content = n.content.replace(new RegExp('#' + tag.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'g'), '');
                    n.updatedAt = new Date().toISOString();
                    updated++;
                }
            });
            saveNotes(notes);
            if (getTagFilter() === tag) setTagFilter('');
            renderNoteList();
            alert('已从 ' + updated + ' 篇笔记中删除标签 #' + tag);
        }

        function renderFolderTree() {
            var folders = getFolders();
            var tree = document.getElementById('folderTree');
            if (!tree) return;
            if (folders.length === 0) {
                tree.style.display = 'none';
                return;
            }
            tree.style.display = 'block';
            var current = getFolderFilter();
            var html = '<span style="color:#6c757d;margin-right:4px">文件夹:</span>';
            html += '<span onclick="setFolderFilter(\'\');renderNoteList();" style="cursor:pointer;color:' + (!current ? '#4a6cf7' : '#6c757d') + ';margin-right:8px;font-weight:' + (!current ? 'bold' : 'normal') + '">全部</span>';
            folders.forEach(function(f) {
                var count = getNotes().filter(function(n) { return !n.deleted && n.folder === f; }).length;
                var isActive = f === current;
                html += '<span onclick="setFolderFilter(\'' + escapeHtml(f) + '\');renderNoteList();" style="cursor:pointer;color:' + (isActive ? '#4a6cf7' : '#6c757d') + ';margin-right:8px;font-weight:' + (isActive ? 'bold' : 'normal') + '">📁 ' + escapeHtml(f) + ' (' + count + ')</span>';
            });
            tree.innerHTML = html;
        }

        // ============ 长按检测 ============
        function startLongPress(id, el) {
            if (isSelecting) return;
            longPressTarget = id;
            longPressTimer = setTimeout(function() {
                longPressTimer = null;
                enterSelectionMode(id);
                if (navigator.vibrate) navigator.vibrate(50);
            }, 500);
        }

        function cancelLongPress() {
            if (longPressTimer) {
                clearTimeout(longPressTimer);
                longPressTimer = null;
                longPressTarget = null;
            }
        }

        // ============ 启动 ============
        init();
    </script>
</body>
</html>
