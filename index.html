<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>酷软笔记</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a2e">
</head>
<body>
    <div class="app">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>📝 酷软笔记</h1>
                <button id="newNote" title="新建笔记">+</button>
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索笔记...">
            </div>
            <div class="filter-tabs">
                <button class="tab active" data-filter="all">全部</button>
                <button class="tab" data-filter="starred">⭐ 收藏</button>
                <button class="tab" data-filter="trash">🗑️ 回收站</button>
            </div>
            <div id="noteList" class="note-list"></div>
        </aside>

        <!-- 主编辑区 -->
        <main class="editor">
            <div class="editor-header">
                <input type="text" id="noteTitle" placeholder="笔记标题">
                <div class="editor-actions">
                    <button id="togglePreview" title="预览">👁️</button>
                    <button id="toggleStar" title="收藏">☆</button>
                    <button id="deleteNote" title="删除">🗑️</button>
                    <button id="exportNote" title="导出">📤</button>
                </div>
            </div>
            <div class="editor-body">
                <textarea id="noteContent" placeholder="开始写作..."></textarea>
                <div id="preview" class="preview hidden"></div>
            </div>
            <div class="editor-footer">
                <span id="lastSaved">未保存</span>
                <span id="wordCount">0 字</span>
            </div>
        </main>
    </div>

    <script src="js/markdown.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js');
        }
    </script>
</body>
</html>
